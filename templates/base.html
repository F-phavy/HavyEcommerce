<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{% block title %} Havy Boutique {% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        html,
        body {
            max-width: 100%;
            overflow-x: hidden;
            position: relative;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Smooth scrolling for a premium feel */
        html {
            scroll-behavior: smooth;
        }

        /* Custom selection color to match your vibrant vibe */
        ::selection {
            background: #FF4D00;
            color: white;
        }


        /* The Hidden State */
        .reveal-on-scroll {
            opacity: 0;
            transform: translateY(30px);
            filter: blur(5px);
            transition: all 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* The Revealed State */
        .reveal-on-scroll.active {
            opacity: 1;
            transform: translateY(0);
            filter: blur(0);
        }
    </style>
</head>

<body class="bg-[#FAF9F6] text-black flex flex-col min-h-screen antialiased">

    <header class="z-50">
        {% include "includes/nav.html" %}
    </header>

    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>


    <a href="https://wa.me/2349055191734" target="_blank" class="fixed bottom-10 right-10 z-50">

        <div class="relative group">
            <div
                class="absolute -inset-2 bg-gradient-to-tr from-green-500 to-green-500 rounded-[2rem] blur opacity-20 group-hover:opacity-40 transition duration-500">
            </div>

            <div
                class="relative flex items-center gap-4 bg-white/80 backdrop-blur-xl border border-white p-2 pr-6 rounded-full shadow-2xl transition-all duration-500 group-hover:-translate-y-2">
                <div class="w-12 h-12 bg-black rounded-full flex items-center justify-center text-white shadow-lg">
                    <i class="bi bi-whatsapp text-xl"></i>
                </div>
                <div class="flex flex-col">
                    <span class="text-[9px] font-black uppercase tracking-widest text-gray-400 leading-none">Drop a
                        DM</span>
                    <span class="text-[12px] font-black uppercase tracking-tight text-black">@favour</span>
                </div>
            </div>
        </div>
    </a>


    <footer class="mt-8 px-4 md:px-6 pb-6">
    <div class="max-w-[1200px] mx-auto bg-black rounded-[1.5rem] md:rounded-[2rem] p-6 md:p-10 shadow-2xl border border-white/5 relative overflow-hidden text-white">

        <div class="relative z-10 flex flex-col md:flex-row justify-between items-center gap-6 md:gap-10 text-center md:text-left">

            <div class="flex flex-col items-center md:items-start gap-3">
                <div class="flex items-center gap-2">
                    <h2 class="text-2xl md:text-3xl font-black uppercase tracking-tighter leading-none">
                        HAVY
                    </h2>
                    <div class="w-1 h-1 md:w-1.5 md:h-1.5 rounded-full bg-orange-600"></div>
                </div>

                <div class="flex items-center gap-6">
                    <a href="/" class="text-[8px] md:text-[9px] font-black uppercase tracking-[0.3em] text-gray-400 hover:text-white transition-colors">Shop</a>
                    <a href="{% url 'cart:cart_detail' %}" class="relative inline-flex items-center group">
                        <i class="bi bi-bag text-white text-lg md:text-xl"></i>
                        {% if cart|length > 0 %}
                        <span class="absolute -top-1.5 -right-1.5 flex h-3.5 w-3.5 items-center justify-center rounded-full bg-orange-600 text-[8px] font-black text-white ring-1 ring-black">
                            {{ cart|length }}
                        </span>
                        {% endif %}
                    </a>
                </div>
            </div>

            <div class="flex flex-col items-center md:items-end gap-3 w-full md:w-auto">
                <span class="text-[7px] md:text-[8px] font-black uppercase tracking-[0.3em] text-gray-600">Socials</span>
                <div class="flex items-center gap-6 md:gap-6">
                    <a href="https://wa.me/2349055191734" target="_blank" class="text-xl md:text-2xl text-[#25D366] transition-transform active:scale-90">
                        <i class="bi bi-whatsapp"></i>
                    </a>
                    <a href="https://www.instagram.com/favourr_p?igsh=NHQwNjJ1emo0dHZk" target="_blank" class="text-xl md:text-2xl text-[#E1306C] transition-transform active:scale-90">
                        <i class="bi bi-instagram"></i>
                    </a>
                    <a href="https://www.linkedin.com/in/favour-samuel-6790833a3" target="_blank" class="text-xl md:text-2xl text-[#0077B5] transition-transform active:scale-90">
                        <i class="bi bi-linkedin"></i>
                    </a>
                </div>
            </div>
        </div>

        <div class="mt-6 pt-4 border-t border-white/5 flex justify-center items-center text-center">
            <p class="text-[7px] md:text-[8px] font-black uppercase tracking-[0.4em] text-gray-700">
                © 2026 HAVY • VERIFIED
            </p>
        </div>
    </div>
</footer>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal-on-scroll').forEach((el) => observer.observe(el));
    </script>

</body>

</html>
