<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{% block title %} Havy Boutique {% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Smooth scrolling for a premium feel */
        html {
            scroll-behavior: smooth;
        }

        /* Custom selection color to match your vibrant vibe */
        ::selection {
            background: #FF4D00;
            color: white;
        }


        /* The Hidden State */
        .reveal-on-scroll {
            opacity: 0;
            transform: translateY(30px);
            filter: blur(5px);
            transition: all 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* The Revealed State */
        .reveal-on-scroll.active {
            opacity: 1;
            transform: translateY(0);
            filter: blur(0);
        }
    </style>
</head>

<body class="bg-[#FAF9F6] text-black flex flex-col min-h-screen antialiased">

    <header class="z-50">
        {% include "includes/nav.html" %}
    </header>

    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>


    <a href="https://www.instagram.com/favourr_p?igsh=NHQwNjJ1emo0dHZk" target="_blank"
        class="fixed bottom-10 right-10 z-50">

        <div class="relative group">
            <div
                class="absolute -inset-2 bg-gradient-to-tr from-orange-500 to-rose-500 rounded-[2rem] blur opacity-20 group-hover:opacity-40 transition duration-500">
            </div>

            <div
                class="relative flex items-center gap-4 bg-white/80 backdrop-blur-xl border border-white p-2 pr-6 rounded-full shadow-2xl transition-all duration-500 group-hover:-translate-y-2">
                <div class="w-12 h-12 bg-black rounded-full flex items-center justify-center text-white shadow-lg">
                    <i class="bi bi-instagram text-xl"></i>
                </div>
                <div class="flex flex-col">
                    <span class="text-[9px] font-black uppercase tracking-widest text-gray-400 leading-none">Drop a
                        DM</span>
                    <span class="text-[12px] font-black uppercase tracking-tight text-black">@favourr_p</span>
                </div>
            </div>
        </div>
    </a>


    <footer class="mt-12 px-6 pb-8">
        <div
            class="max-w-[1200px] mx-auto bg-black rounded-[2rem] p-6 md:p-10 shadow-2xl border border-white/5 relative overflow-hidden text-white">

            <div class="relative z-10 flex flex-col md:flex-row justify-between items-center gap-8">
                <div class="text-center md:text-left">
                    <div class="flex items-center justify-center md:justify-start gap-2 mb-3">
                        <h2 class="text-3xl font-black uppercase tracking-tighter leading-none">
                            HAVY
                        </h2>
                        <div class="w-1.5 h-1.5 rounded-full bg-gradient-to-tr from-[#7928ca] to-[#ff0080]"></div>
                    </div>

                    <div class="flex gap-6 text-[9px] font-black uppercase tracking-[0.3em] text-gray-500">
                        <a href="/" class="hover:text-white transition-colors">Shop</a>
                        <a href="{% url 'cart:cart_detail' %}" class="relative inline-flex items-center p-2 group">
                            <i class="bi bi-bag text-white text-xl transition-transform group-hover:scale-110"></i>

                            {% if cart|length > 0 %}
                            <span
                                class="absolute -top-1 -right-1 flex h-4 w-4 items-center justify-center rounded-full bg-[#ff0080] text-[9px] font-black text-white ring-2 ring-black">
                                {{ cart|length }}
                            </span>
                            {% endif %}
                        </a>
                    </div>
                </div>

                <a href="https://www.instagram.com/favourr_p?igsh=NHQwNjJ1emo0dHZk" target="_blank"
                    class="relative p-[1px] group rounded-full bg-gradient-to-r from-[#7928ca] to-[#ff0080] transition-transform hover:scale-105">
                    <div class="bg-black rounded-full px-8 py-3 transition-colors group-hover:bg-transparent">
                        <span class="text-white font-black uppercase tracking-widest text-[10px]">DM @favourr_p</span>
                    </div>
                </a>

                <div class="flex items-center gap-6 border-l border-white/10 pl-8">
                    <a href="https://www.linkedin.com/in/favour-samuel-6790833a3" target="_blank"
                        class="text-gray-500 hover:text-[#7928ca] transition-colors text-xl">
                        <i class="bi bi-linkedin"></i>
                    </a>
                </div>
            </div>

            <div class="mt-8 pt-6 border-t border-white/5 flex justify-center items-center">
                <p class="text-[8px] font-black uppercase tracking-[0.5em] text-gray-700">
                    © 2026 HAVY • VERIFIED STANDARD
                </p>
            </div>
        </div>
    </footer>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal-on-scroll').forEach((el) => observer.observe(el));
    </script>

</body>

</html>
